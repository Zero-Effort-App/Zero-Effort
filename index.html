<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/zero-effort-logo-dark.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f1117" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Zero Effort" />
    <link rel="apple-touch-icon" href="/zero-effort-icon-white.png" />
    <script>
      (function() {
        var path = window.location.pathname;
        var manifestUrl = '/manifest.json'; // default
        if (path.startsWith('/applicant') || path.startsWith('/jobs')) {
          manifestUrl = '/manifest-applicant.json';
        } else if (path.startsWith('/company')) {
          manifestUrl = '/manifest-company.json';
        } else if (path.startsWith('/admin')) {
          manifestUrl = '/manifest-admin.json';
        }
        var link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestUrl;
        document.head.appendChild(link);
      })();
    </script>
    <title>Zero Effort</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
